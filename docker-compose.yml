version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: central_postgres
    restart: always
    environment:
      POSTGRES_USER: central_admin
      POSTGRES_PASSWORD: pleasedonthackmeimanewbie
      POSTGRES_DB: skc_central
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind strictly to localhost/Tailscale so it's not exposed publicly
      - "127.0.0.1:5432:5432"

  api:
    image: central-api:latest
    container_name: central_api_service
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Bound to the droplet's Tailscale IP only. Do NOT change this back to a bare
      # "7290:7290": that publishes on 0.0.0.0 and BYPASSES ufw, because Docker writes
      # its own iptables DNAT rules ahead of the ufw chain. That combination left the API
      # answering on the droplet's public IP (168.144.42.235:7290) until 2026-07-20 -
      # exposing every ungated GET and the fail-open branch writes to the open internet.
      # This binding, not the OS firewall, is what keeps the API on the tailnet.
      - "100.84.79.35:7290:7290"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=7290
      - ConnectionStrings__DefaultConnection=Host=db;Database=skc_central;Username=central_admin;Password=pleasedonthackmeimanewbie
    depends_on:
      - db

volumes:
  pgdata:
