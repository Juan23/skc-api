version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: central_postgres
    restart: always
    environment:
      POSTGRES_USER: central_admin
      POSTGRES_PASSWORD: pleasedonthackmeimanewbie
      POSTGRES_DB: skc_central
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind strictly to localhost/Tailscale so it's not exposed publicly
      - "127.0.0.1:5432:5432"

  api:
    image: central-api:latest
    container_name: central_api_service
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # NOTE: unlike the db service below, this binding has no host IP, so Docker publishes
      # it on ALL interfaces (0.0.0.0), not just the Tailscale one. This file alone does NOT
      # restrict access to the tailnet - that protection (if any) currently lives entirely in
      # the droplet's OS/cloud firewall, outside this repo. Verify that firewall independently;
      # don't assume this comment or the app's IP-allowlist checks are the only gate (several
      # endpoints, e.g. GET *, POST /api/deliveries/{id}/accept, POST /api/production, have no
      # IP-allowlist check at all and rely entirely on that external firewall).
      - "7290:7290"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=7290
      - ConnectionStrings__DefaultConnection=Host=db;Database=skc_central;Username=central_admin;Password=pleasedonthackmeimanewbie
    depends_on:
      - db

volumes:
  pgdata:
